services:
  azure-keyvault-emulator:
    build:
      context: .
    environment:
      PORT: 8080
      HTTPS_PORT: 8443
      STORE_BACKEND: memory
      STORE_DSN: ""
    ports:
      - "8080:8080"
      - "8443:8443"

